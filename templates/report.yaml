---
CJKmainfont: "Noto Serif CJK SC"
CJKsansfont: "Noto Sans CJK SC"
CJKmonofont: "Noto Sans CJK SC"
mainfont: "Noto Serif CJK SC"
sansfont: "Noto Sans CJK SC"
monofont: "DejaVu Sans Mono"
geometry: "a4paper, margin=2cm"
documentclass: "article"
fontsize: "11pt"
linestretch: 1.3
toc: true
toc-depth: 3
header-includes:
  - \usepackage{booktabs}
  - \usepackage{longtable}
  - \usepackage{array}
  - \usepackage{multirow}
  - \usepackage{float}
  - \usepackage{colortbl}
  - \usepackage{xcolor}
  - \usepackage{fancyhdr}
  # sectsty replaces titlesec: only modifies font/color of headings without
  # redefining the section command internals, so hyperref bookmark anchors
  # stay at the correct page position (titlesec caused anchors to land on the
  # previous page when a heading appeared at the top of a new page).
  - \usepackage{sectsty}
  - \usepackage{enumitem}
  - \usepackage{hyperref}
  - \usepackage{fvextra}
  - \usepackage{listings}
  # ---------- v1.0.1: TOC alignment fixes ----------
  # tocloft: precise control over TOC layout and dot leaders
  - \usepackage{tocloft}
  # Suppress LaTeX auto-numbering (headings carry their own Chinese/Arabic numbers)
  - \setcounter{secnumdepth}{0}
  # Add dot leaders for all TOC levels so page numbers align at the right margin
  - \renewcommand{\cftsecleader}{\cftdotfill{\cftdotsep}}
  - \renewcommand{\cftsubsecleader}{\cftdotfill{\cftdotsep}}
  - \renewcommand{\cftsubsubsecleader}{\cftdotfill{\cftdotsep}}
  # Tighten vertical spacing between TOC entries
  - \setlength{\cftbeforesecskip}{2pt}
  - \setlength{\cftbeforesubsecskip}{1pt}
  # ---------- v1.0.1: Table long-text / URL wrap fixes ----------
  # xurl: allows line breaks inside URLs and long strings at any character
  - \usepackage{xurl}
  # ragged2e: \RaggedRight keeps words from overflowing narrow table columns
  - \usepackage{ragged2e}
  # microtype: better inter-word spacing and automatic hyphenation
  - \usepackage{microtype}
  # ragged2e provides \RaggedRight for manual use; pandoc's longtable uses
  # built-in p{} columns (width controlled by table_wrap.lua), so no custom
  # column type is needed here.
  # ---------- v1.0.1: Page margin overflow fixes ----------
  # fancyvrb: break long lines in ALL code blocks (fenced ``` blocks in pandoc
  # output use the Highlighting/Verbatim environment which respects fvset).
  # breaksymbolleft={} suppresses the ugly continuation arrow glyph.
  - \fvset{breaklines=true, breaksymbolleft={}, breaksymbolright={}, breakanywhere=true}
  # listings: same for \begin{lstlisting} blocks
  - \lstset{breaklines=true, breakatwhitespace=false, basicstyle=\ttfamily\small}
  # emergencystretch: last-resort extra inter-word space to prevent overflow in
  # regular paragraphs containing long technical strings without natural break points
  - \setlength{\emergencystretch}{3em}
  # hfuzz: tolerate up to 3pt overfull before LaTeX raises an error and stops
  # trying to reflow — keeps minor rounding artefacts from blocking compilation
  - \setlength{\hfuzz}{3pt}
  # ---------- shared styles ----------
  - \definecolor{tableheader}{RGB}{41, 65, 122}
  - \definecolor{linkcolor}{RGB}{0, 82, 155}
  - \hypersetup{colorlinks=true, linkcolor=linkcolor, urlcolor=linkcolor, citecolor=linkcolor}
  - \pagestyle{fancy}
  - \fancyhf{}
  - \fancyhead[L]{\small\leftmark}
  - \fancyhead[R]{\small\rightmark}
  - \fancyfoot[C]{\thepage}
  - \renewcommand{\headrulewidth}{0.4pt}
  - \renewcommand{\footrulewidth}{0.2pt}
  # sectsty: set heading fonts/colors (equivalent visual result to titlesec)
  - \sectionfont{\LARGE\bfseries\color{tableheader}}
  - \subsectionfont{\Large\bfseries\color{tableheader}}
  - \subsubsectionfont{\large\bfseries}
  - \setlist[itemize]{leftmargin=2em, itemsep=2pt}
  - \setlist[enumerate]{leftmargin=2em, itemsep=2pt}
  - \renewcommand{\arraystretch}{1.4}
---
